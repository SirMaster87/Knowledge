{% macro student_sidebar(active='') %}
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="user-name">{{ session.name }}</div>
        <div class="user-role">Student</div>
    </div>
    <ul class="sidebar-nav">
        <div class="sidebar-section-title">Student Portal</div>
        <li><a href="{{ url_for('student_dashboard') }}" {% if active=='dashboard' %}class="active"{% endif %}><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a href="{{ url_for('student_results') }}" {% if active=='results' %}class="active"{% endif %}><i class="fas fa-chart-bar"></i> My Results</a></li>
        <li><a href="{{ url_for('student_profile') }}" {% if active=='profile' %}class="active"{% endif %}><i class="fas fa-user"></i> My Profile</a></li>
        <div class="sidebar-section-title">Quick Links</div>
        <li><a href="{{ url_for('courses') }}"><i class="fas fa-book"></i> All Courses</a></li>
        <li><a href="{{ url_for('contact') }}"><i class="fas fa-headset"></i> Contact Admin</a></li>
        <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
</aside>
{% endmacro %}
