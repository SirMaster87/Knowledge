{% extends 'base.html' %}
{% block title %}Login - Knowledge Group Tuition{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">K</div>
            <h2>Welcome Back</h2>
            <p>Sign in to your Knowledge Group account</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="your@email.com" autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <div class="auth-link">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </div>
        <div class="auth-link" style="margin-top:8px">
            <a href="{{ url_for('enroll') }}" style="color:var(--accent)">Want to enroll? → Apply here</a>
        </div>
    </div>
</div>
{% endblock %}
