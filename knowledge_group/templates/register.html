{% extends 'base.html' %}
{% block title %}Register - Knowledge Group Tuition{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">K</div>
            <h2>Create Account</h2>
            <p>Register as a student on our portal</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" required placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="+91 XXXXX XXXXX">
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" required placeholder="Create a strong password" minlength="6">
            </div>
            <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        <div class="auth-link">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
